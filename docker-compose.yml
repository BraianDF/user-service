services:
  postgres:
    image: postgres:15
    container_name: postgres

    ports:
      - "${DB_PORT:-5432}:5432"

    environment:
      POSTGRES_USER: ${DB_USER:-db-user}
      POSTGRES_PASSWORD: ${DB_PASS:-db-pass}
      POSTGRES_DB: ${DB_NAME:-db-user-service}

    volumes:
      - postgres-data:/var/lib/postgresql/data

    restart: unless-stopped

volumes:
  postgres-data: