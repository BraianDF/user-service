spring.application.name=user-service
server.port=8082

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:db-user-service}
spring.datasource.username=${DB_USER:db-user}
spring.datasource.password=${DB_PASS:db-pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

api.security.token.secret=${JWT_SECRET:my-secret-key}
api.security.admin.email=${ADMIN_EMAIL:admin@email.com}
api.security.admin.password=${ADMIN_PASSWORD:admin-password}

cors.allowed-origin=${CORS_ALLOWED_ORIGIN:*}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

logging.level.root=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.hibernate.type.descriptor.sql=TRACE
